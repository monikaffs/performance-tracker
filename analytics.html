<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics & Leaderboard | BNI MCM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        .chart-container {
            position: relative;
            height: 250px;
            width: 100%;
            margin-bottom: 30px;
        }
.leaderboard-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 16px;
    border-radius: 14px;
    margin-bottom: 10px;
    background: rgba(255,255,255,0.03);
    transition: all 0.25s ease;
}

.leaderboard-row:hover {
    background: rgba(255,255,255,0.08);
    transform: translateX(4px);
}

        .glass-card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(18px);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 22px;
    padding: 22px;
    transition: all 0.3s ease;
}

.glass-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.4);
}

h3 {
    font-size: 1.3rem;
    font-weight: 600;
    letter-spacing: -0.5px;
    margin-bottom: 12px;
}

.rank {
    width: 32px;
    height: 32px;
    font-size: 0.9rem;
    box-shadow: 0 0 10px rgba(255,255,255,0.1);
}

.top-1 {
    background: linear-gradient(90deg, rgba(255,215,0,0.15), transparent);
}
.top-2 {
    background: linear-gradient(90deg, rgba(192,192,192,0.15), transparent);
}
.top-3 {
    background: linear-gradient(90deg, rgba(205,127,50,0.15), transparent);
}

.score-pill {
    background: rgba(230, 57, 70, 0.15);
    border: 1px solid rgba(230, 57, 70, 0.4);
    padding: 6px 14px;
    border-radius: 20px;
    font-weight: 700;
    font-size: 0.85rem;
    letter-spacing: 0.5px;
}
.chart-container {
    padding: 10px;
}
.animate-fade {
    animation: fadeUp 0.6s ease;
}

@keyframes fadeUp {
    from {
        opacity: 0;
        transform: translateY(20px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.navbar {
    backdrop-filter: blur(12px);
    background: rgba(0,0,0,0.6);
    border-bottom: 1px solid rgba(255,255,255,0.05);
}

        .rank {

            background: var(--glass-bg);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            margin-right: 15px;
        }
        .top-1 .rank { background: #ffd700; color: #000; } /* Gold */
        .top-2 .rank { background: #c0c0c0; color: #000; } /* Silver */
        .top-3 .rank { background: #cd7f32; color: #000; } /* Bronze */
        
        .score-pill {
            background: rgba(230, 57, 70, 0.2);
            color: var(--primary);
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 700;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="container nav-content">
            <a href="dashboard.html" class="btn-back">
        <i class="fas fa-chevron-left"></i> Back to Dashboard
    </a>
            <span style="font-weight: 600;">Analytics</span>
        </div>
    </nav>

    <div class="container animate-fade" style="padding-top: 20px; padding-bottom: 50px;">
        
        <!-- 1. Performance Trends -->
        <h3 style="margin-bottom: 15px;">Weekly Trends</h3>
        <div class="glass-card" style="margin-bottom: 30px;">
            <div class="chart-container">
                <canvas id="trendsChart"></canvas>
            </div>
        </div>

        <!-- 2. Leaderboard -->
        <h3 style="margin-bottom: 15px;">MCM Leaderboard</h3>
        <div class="glass-card">
            <div id="leaderboardList">
                <!-- Populated via JS -->
                <div style="text-align:center; padding:20px;">Calculating scores...</div>
            </div>
        </div>

        <!-- 3. Metrics Distribution -->
        <h3 style="margin: 30px 0 15px;">Metrics Overview</h3>
        <div class="grid-2" style="display: grid; grid-template-columns: 1fr; gap: 20px;">
            <div class="glass-card">
                <h4 style="font-size:0.9rem; color:var(--text-muted); margin-bottom:15px;">Referrals vs Visitors</h4>
                <div class="chart-container" style="height:200px;">
                    <canvas id="distributionChart"></canvas>
                </div>
            </div>
        </div>

    </div>

        <footer class="main-footer">
    <div class="bni-brand" style="margin-bottom: 10px; font-size: 1.1rem;">BNI MCM Tracker</div>
    <div class="footer-text">
        &copy; 2026 BNI Membership Committee. All rights reserved.<br>
        Optimized for Performance Accountability and Transparency.
    </div>
</footer>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Your scripts -->
    <script src="js/firebase-config.js"></script>
    <script src="js/analytics.js"></script>
    
</body>
</html>
