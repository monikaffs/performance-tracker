<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | BNI MCM Tracker</title>
    <!-- Premium Google Font: Poppins -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Main Global CSS -->
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        /* Login Page Specific Styling */
        body {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-wrapper {
            width: 100%;
            max-width: 420px;
            animation: fadeInScale 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeInScale {
            from { opacity: 0; transform: scale(0.95) translateY(10px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /*
        .role-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 25px;
        }


        .role-option {
            flex: 1;
            position: relative;
        }
        */

        .role-option input {
            position: absolute;
            opacity: 0;
            width: 0; height: 0;
        }

        /*
        .role-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px;
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            color: var(--text-dim);
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .role-box i {
            font-size: 1.2rem;
            margin-bottom: 8px;
        }
        */
        .role-option input:checked + .role-box {
            background: rgba(230, 57, 70, 0.1);
            border-color: var(--primary);
            color: white;
            box-shadow: 0 0 15px rgba(230, 57, 70, 0.2);
        }

        .form-group {
            margin-bottom: 1.2rem;
            position: relative;
        }

        .form-group i {
            position: absolute;
            left: 18px;
            top: 18px;
            color: var(--text-dim);
            font-size: 0.9rem;
        }

        .form-input {
            width: 100%;
            padding: 16px 16px 16px 48px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            border-radius: 14px;
            color: white;
            outline: none;
            transition: 0.3s;
            font-size: 1rem;
        }

        .form-input:focus {
            border-color: var(--primary);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 4px rgba(230, 57, 70, 0.1);
        }

        .error-msg {
            color: var(--primary);
            font-size: 0.85rem;
            text-align: center;
            margin-top: 15px;
            min-height: 20px;
        }

        .loader {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 0.8s linear infinite;
            display: none;
            margin-left: 10px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div class="login-wrapper">
        <div class="glass-card" style="padding: 40px 30px;">
            <div class="logo-area" style="text-align: center; margin-bottom: 35px;">
                <h1 style="font-size: 2.2rem; letter-spacing: -1px;">BNI<span class="bni-brand">MCM</span> Tracker</h1>
                <p style="color: var(--text-dim); font-size: 0.85rem; margin-top: 5px; font-weight: 400;">
                    Membership Committee Performance
                </p>
            </div>

            <form id="loginForm">
                <!--
                <p style="font-size: 0.8rem; color: var(--text-dim); margin-bottom: 12px; font-weight: 500;">SIGN IN AS</p>
                <div class="role-selector">
                    <label class="role-option">
                        <input type="radio" name="userRole" value="admin" checked>
                        <div class="role-box">
                            <i class="fas fa-user-shield"></i>
                            <span>Admin</span>
                        </div>
                    </label>
                    <label class="role-option">
                        <input type="radio" name="userRole" value="member">
                        <div class="role-box">
                            <i class="fas fa-user"></i>
                            <span>Member</span>
                        </div>
                    </label>
                </div>
                -->


                    <div class="form-group" id="nameGroup">
                        <i class="fas fa-user-tag"></i>
                        <!--<input type="text" id="fullName" class="form-input" placeholder="Your Full Name" required> -->
                        <input type="text" id="fullName" class="form-input" placeholder="Your Full Name (Optional)">
                    </div>

                    <div class="form-group">
                       <i class="fas fa-envelope"></i>
                       <input type="email" id="email" class="form-input" placeholder="Email Address" required>
                    </div>

                <div class="form-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" class="form-input" placeholder="Password" required>
                </div>

                <button type="submit" class="btn-primary" id="loginBtn" style="display: flex; justify-content: center; align-items: center; gap: 10px;">
                    <span>Access Dashboard</span>
                    <div class="loader" id="loginLoader"></div>
                </button>
            </form>

            <div id="errorMsg" class="error-msg"></div>
        </div>
    </div>

    <!-- UNIVERSAL FOOTER -->
    <footer class="main-footer" style="width: 100%; max-width: 500px; background: transparent; border: none;">
        <div class="bni-brand" style="margin-bottom: 8px; font-size: 1rem; opacity: 0.8;">BNI MCM Tracker</div>
        <div class="footer-text">
            Membership Committee Performance Tracker<br>
            &copy; 2025 BNI. Designed for Industry-Level Excellence.
        </div>
    </footer>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <!-- App Scripts -->
    <script src="js/firebase-config.js"></script>
    <script src="js/auth.js"></script>

</body>
</html>
