<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weekly Records | BNI MCM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .filters-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }
        .record-card {
            margin-bottom: 15px;
            border-left: 4px solid var(--primary);
        }
        .record-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }
        .record-metrics {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            font-size: 0.85rem;
            background: rgba(255,255,255,0.03);
            padding: 10px;
            border-radius: 10px;
        }
        .metric-item { display: flex; flex-direction: column; }
        .metric-label { color: var(--text-muted); font-size: 0.7rem; }
        .metric-value { font-weight: 600; }
        
        .admin-actions {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            border-top: 1px solid var(--glass-border);
            padding-top: 10px;
        }

        /* Responsive: Show table on desktop, cards on mobile */
        @media (max-width: 600px) {
            .desktop-table { display: none; }
        }
        @media (min-width: 601px) {
            .mobile-cards { display: none; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="container nav-content">
            <a href="dashboard.html" class="btn-back">
        <i class="fas fa-chevron-left"></i> Back to Dashboard
    </a>
            <span style="font-weight: 600;">Weekly Records</span>
        </div>
    </nav>

    <div class="container animate-fade" style="padding-top: 20px; padding-bottom: 50px;">
        
        <!-- Filters -->
        <div class="glass-card" style="margin-bottom: 20px;">
            <div class="filters-grid">
                <div>
                    <label style="font-size: 0.8rem;">Filter Week</label>
                    <select id="filterWeek" class="form-control" style="margin-bottom:0;">
                        <option value="all">All Weeks</option>
                        <!-- 1-25 generated by JS -->
                    </select>
                </div>
                <div>
                    <label style="font-size: 0.8rem;">Filter Member</label>
                    <select id="filterMember" class="form-control" style="margin-bottom:0;">
                        <option value="all">All Members</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Mobile View (Cards) -->
        <div id="mobileRecords" class="mobile-cards">
            <!-- Dynamically populated -->
        </div>

        <!-- Desktop View (Table) -->
        <div class="glass-card desktop-table">
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Week</th>
                            <th>Member</th>
                            <th>Attendance</th>
                            <th>Ref</th>
                            <th>1-2-1</th>
                            <th>Visitors</th>
                            <th>Media</th>
                            <th class="admin-only">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="desktopRecordsBody">
                        <!-- Dynamically populated -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Empty State -->
        <div id="emptyState" style="display:none; text-align:center; padding: 50px 20px;">
            <i class="fas fa-folder-open fa-3x" style="color: var(--glass-border); margin-bottom: 15px;"></i>
            <p style="color: var(--text-muted);">No records found for the selected filters.</p>
        </div>

    </div>

        <footer class="main-footer">
    <div class="bni-brand" style="margin-bottom: 10px; font-size: 1.1rem;">BNI MCM Tracker</div>
    <div class="footer-text">
        &copy; 2026 BNI Membership Committee. All rights reserved.<br>
        Optimized for Performance Accountability and Transparency.
    </div>
</footer>

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

    <script src="js/firebase-config.js"></script>
    <script src="js/records.js"></script>
</body>
</html>
