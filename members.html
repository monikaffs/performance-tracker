<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Members | BNI MCM Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* Modal Glassmorphism */
        .modal {
            display: none; position: fixed; z-index: 2000; left: 0; top: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); backdrop-filter: blur(8px);
        }
        .modal-content {
            background: rgba(20, 25, 35, 0.95);
            border: 1px solid var(--glass-border);
            border-radius: 24px; width: 90%; max-width: 450px;
            margin: 10% auto; padding: 30px; position: relative;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        .form-input {
            width: 100%; padding: 12px 15px; background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border); border-radius: 12px;
            color: white; margin-bottom: 15px; outline: none;
        }
        .form-input:focus { border-color: var(--primary); }
    </style>
</head>



<body style="visibility: hidden;">

    <!-- NAV BAR: Fix #1 (White Logo) & Fix #6 (User Name) -->
    <nav class="navbar">
        <div class="container nav-content">
            <a href="dashboard.html" class="nav-logo" style="text-decoration: none; display: flex; align-items: center; gap: 12px;">
                <div class="logo-box">
                    <i class="fas fa-chart-line"></i>
                </div>
                <span style="font-weight: 700; font-size: 1.1rem; color: #fff;">BNI<span style="color:var(--primary)">MCM</span></span>
            </a>
            <div class="user-meta" style="display: flex; align-items: center; gap: 15px;">
                <div style="text-align: right;">
                    <span id="navUserName" style="font-weight: 600; color: #fff; display: block; font-size: 0.9rem;"></span>
                    <span id="navUserRole" style="font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase;">Admin</span>
                </div>
                <button onclick="logout()" class="btn-logout" style="width: 40px; height: 40px; border-radius: 10px; border: 1px solid var(--glass-border); background: transparent; color: var(--text-dim); cursor: pointer; transition: 0.3s;">
                    <i class="fas fa-sign-out-alt"></i>
                </button>
            </div>
        </div>
    </nav>

    <main class="container" style="padding-top: 30px;">
        <!-- BACK BUTTON -->
        <a href="dashboard.html" class="btn-back">
            <i class="fas fa-chevron-left"></i> Back to Dashboard
        </a>

        <!-- HEADER -->
        <div style="display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 30px;">
            <div>
                <h2 style="font-size: 1.8rem; letter-spacing: -1px;">Committee Members</h2>
                <p style="color: var(--text-dim); font-size: 0.9rem;">Management & Performance Overview</p>
            </div>
            <!--<button onclick="openModal()" class="btn-primary" style="width: auto; padding: 12px 24px; font-size: 0.9rem;"> -->
            <button id="addMemberBtn" onclick="openModal()" class="btn-primary" style="width: auto; padding: 12px 24px; font-size: 0.9rem;">
                <i class="fas fa-user-plus"></i> Add New
            </button>
        </div>

        <!-- TABLE: Fix #4 (Glassmorphism) -->
        <div class="glass-card" style="padding: 0; overflow: hidden;">
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>MEMBER NAME</th>
                            <th>STATUS</th>
                            <th>JOINED</th>
                            <th style="text-align: right;">ACTIONS</th>
                        </tr>
                    </thead>
                    <tbody id="membersList">
                        <!-- Members will be loaded here -->
                        <tr>
                            <td colspan="4" style="text-align: center; padding: 50px; color: var(--text-dim);">
                                <i class="fas fa-circle-notch fa-spin"></i> Synchronizing with Firestore...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- FOOTER: Fix #6 (Sticky Footer Structure) -->
    <footer class="main-footer">
        <div class="container">
            <p style="font-weight: 700; color: var(--primary); font-size: 1rem; margin-bottom: 5px;">BNI MCM Tracker</p>
            <p class="footer-text">Membership Committee Performance Tracker v2.0</p>
            <p class="footer-text">&copy; 2025 BNI. Managed by Monika and Team.</p>
        </div>
    </footer>

    <!-- ADD MEMBER MODAL -->
    <div id="memberModal" class="modal">
        <div class="modal-content">
            <h3 style="margin-bottom: 20px;">Add New Committee Member</h3>
            <form id="memberForm">
                <label style="font-size: 0.75rem; color: var(--text-dim);">FULL NAME</label>
                <input type="text" id="mName" class="form-input" placeholder="e.g. John Doe" required>
                
                <label style="font-size: 0.75rem; color: var(--text-dim);">EMAIL ADDRESS</label>
                <input type="email" id="mEmail" class="form-input" placeholder="member@bni.com" required>

                <label style="font-size: 0.75rem; color: var(--text-dim);">MEMBERSHIP STATUS</label>
                <select id="mStatus" class="form-input">
                    <option value="active">Active Member</option>
                    <option value="inactive">Inactive</option>
                </select>

                <div style="display: flex; gap: 10px; margin-top: 10px;">
                    <button type="button" onclick="closeModal()" class="btn-media" style="flex: 1; justify-content: center;">Cancel</button>
                    <button type="submit" class="btn-primary" style="flex: 2;">Save Member</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Firebase -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/members.js"></script>
</body>
</html>
